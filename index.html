  <style>
    /* ---------------------------------------------------
       Doc Site Styles (Matching Reference UI)
       --------------------------------------------------- */
    :root {
      --doc-bg: var(--color-bg-normal);
      --doc-sidebar-bg: var(--color-bg-gray);
      --doc-border: var(--color-border-normal);
      --doc-text-main: var(--color-text-primary);
      --doc-text-muted: var(--color-text-secondary);
      --doc-text-light: var(--color-text-caption);
      --doc-brand: var(--color-primary-normal);
    }
    
    /* We can remove the hardcoded [data-theme="dark"] block here 
       because the tokens handle dark mode automatically in tokens.css */
    
    body {
      margin: 0;
      background-color: var(--doc-bg);
      color: var(--doc-text-main);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .doc-layout {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Sidebar Navigation */
    .doc-sidebar {
      width: 200px;
      background-color: var(--doc-sidebar-bg);
      border-right: 1px solid var(--doc-border);
      padding: 32px 0;
      flex-shrink: 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .doc-layout--sidebar-hidden .doc-sidebar {
      display: none;
    }
    .doc-logo {
      padding: 0 20px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 40px;
      color: var(--doc-text-main);
    }
    .theme-toggle {
      cursor: pointer;
      font: var(--body-medium);
      background: var(--color-bg-popup);
      border: 1px solid var(--color-border-normal);
      color: var(--doc-text-main);
      padding: 0 var(--spacing-4x);
      height: var(--spacing-10x);
      border-radius: var(--radius-m);
      box-shadow: var(--shadow-small);
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .theme-toggle:hover {
      background: var(--color-fill-hover);
      border-color: var(--color-primary-normal);
    }
    .theme-toggle:active {
      transform: translateY(1px);
    }
    .theme-toggle--global {
      position: static;
    }
    .doc-global-actions {
      position: fixed;
      top: var(--spacing-6x);
      right: var(--spacing-6x);
      z-index: 300;
      display: flex;
      align-items: center;
      gap: var(--spacing-3x);
    }
    .doc-layout--home + .doc-global-actions .doc-global-home {
      display: none;
    }
    .nav-group {
      font-size: 11px;
      font-weight: 700;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 20px;
      margin-bottom: 12px;
    }
    .nav-item {
      display: block;
      padding: 10px 20px;
      color: var(--doc-text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      color: var(--doc-text-main);
      background-color: rgba(0,0,0,0.03);
    }
    [data-theme="dark"] .nav-item:hover { background-color: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--color-primary-normal);
      background-color: rgba(57, 100, 255, 0.05);
      border-left-color: var(--color-primary-normal);
      font-weight: 600;
    }

    /* Main Content Area */
    .doc-main {
      flex: 1;
      margin-left: 200px;
      padding: 64px 80px;
      max-width: 1200px;
      box-sizing: border-box;
    }
    .doc-layout--sidebar-hidden .doc-main {
      margin-left: 0;
      width: 100%;
    }
    .doc-main--home {
      max-width: 1120px;
    }
    .doc-main--wide {
      max-width: none;
      padding: 48px 48px 64px;
    }
    .breadcrumb {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .breadcrumb strong {
      color: var(--doc-text-main);
    }
    
    .component-header {
      margin-bottom: 80px;
    }
    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: var(--spacing-10x);
      padding: 0 var(--spacing-4x);
      border-radius: var(--radius-m);
      background: var(--color-bg-popup);
      border: 1px solid var(--color-border-normal);
      color: var(--doc-text-main);
      text-decoration: none;
      font: var(--body-medium);
      box-shadow: var(--shadow-small);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    .header-link:hover {
      background: var(--color-fill-hover);
      border-color: var(--color-primary-normal);
    }
    .component-title {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 16px 0;
      color: var(--doc-text-main);
    }
    .component-desc {
      font-size: 16px;
      color: var(--doc-text-muted);
      line-height: 1.6;
      max-width: 500px;
      margin: 0;
    }
    .home-hero {
      display: grid;
      gap: var(--spacing-5x);
      margin-bottom: var(--spacing-10x);
    }
    .home-eyebrow {
      font: var(--caption-medium);
      color: var(--color-text-caption);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .home-title {
      margin: 0;
      font: var(--display-medium);
      color: var(--color-text-primary);
      letter-spacing: -0.5px;
    }
    .home-desc {
      max-width: 640px;
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
      line-height: 1.7;
    }
    .home-entry-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--spacing-6x);
    }
    .home-entry-card {
      display: grid;
      gap: var(--spacing-5x);
      min-height: 220px;
      padding: var(--spacing-8x);
      color: var(--color-text-primary);
      text-decoration: none;
      background: var(--color-bg-gray);
      border: 1px solid var(--color-border-normal);
      border-radius: var(--radius-xxl);
      box-sizing: border-box;
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
    }
    .home-entry-card:hover {
      transform: translateY(-2px);
      background: var(--color-bg-popup);
      border-color: var(--color-primary-normal);
    }
    .home-entry-card__meta {
      font: var(--caption-medium);
      color: var(--color-primary-normal);
    }
    .home-entry-card__title {
      margin: 0;
      font: var(--headline-medium);
      color: var(--color-text-primary);
    }
    .home-entry-card__desc {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
      line-height: 1.7;
    }
    .home-entry-card__link {
      align-self: end;
      font: var(--body-medium);
      color: var(--color-primary-normal);
    }
    .page-preview-shell {
      width: 100%;
      min-width: 960px;
      border: 1px solid var(--color-border-normal);
      border-radius: var(--radius-xxl);
      overflow: hidden;
      background: var(--color-bg-normal);
      box-sizing: border-box;
    }
    .page-preview-shell .app-container {
      width: 100%;
      height: 760px;
    }
    .page-preview-shell .lds-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-3x);
    }
    .page-preview-form-content {
      width: 872px;
      min-width: 648px;
      max-width: 872px;
      margin: 0 auto;
      padding-top: var(--spacing-2x);
      padding-bottom: var(--spacing-8x);
      box-sizing: border-box;
    }
    .page-preview-hero {
      display: flex;
      gap: var(--spacing-5x);
      box-sizing: border-box;
    }
    .page-preview-hero-divider {
      margin: var(--spacing-8x) 0;
      border-top: 1px dashed var(--color-border-normal);
    }
    .page-preview-hero__media {
      width: 84px;
      height: 84px;
      flex: 0 0 auto;
      border-radius: var(--radius-m);
      background: var(--color-fill-gray);
      overflow: hidden;
    }
    .page-preview-hero__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .page-preview-section {
      display: grid;
      gap: var(--spacing-5x);
    }
    .page-preview-section + .page-preview-section {
      margin-top: var(--spacing-8x);
    }
    .page-preview-section__title {
      margin: 0;
      font: var(--title-medium);
      color: var(--color-text-primary);
    }
    .page-preview-actions {
      display: grid;
      padding: var(--spacing-5x) var(--spacing-8x);
      border-top: 1px solid var(--color-divider-normal);
      background: var(--color-bg-normal);
    }
    .page-preview-actions__inner {
      width: 872px;
      min-width: 648px;
      max-width: 872px;
      margin: 0 auto;
      display: grid;
      justify-content: center;
      gap: var(--spacing-4x);
    }
    .page-preview-actions__buttons {
      display: flex;
      justify-content: center;
      gap: var(--spacing-3x);
    }
    @media (max-width: 960px) {
      .home-entry-grid {
        grid-template-columns: 1fr;
      }
      .doc-main--wide {
        padding: 32px;
      }
    }
    .component-stats {
      position: absolute;
      right: 0;
      bottom: 0;
      display: flex;
      gap: 40px;
    }
    .stat {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--doc-brand);
      line-height: 1;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Variant Section */
    .variant-section {
      margin-bottom: 80px;
    }
    .variant-header {
      display: flex;
      align-items: baseline;
      border-bottom: 1px solid var(--doc-border);
      padding-bottom: 16px;
      margin-bottom: 40px;
    }
    .variant-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 16px 0 0;
      letter-spacing: -0.5px;
    }
    .variant-desc {
      font-size: 14px;
      color: var(--doc-text-muted);
      flex: 1;
    }
    .variant-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Matrix Layout Grid */
    .matrix {
      display: grid;
      grid-template-columns: 140px repeat(3, minmax(140px, 1fr));
      gap: 32px 16px;
      align-items: center;
    }
    .matrix-row {
      display: contents;
    }
    .matrix-cell {
      padding: 16px 0;
      border-bottom: 1px solid var(--doc-border);
      display: flex;
      align-items: center;
      height: 100%;
    }
    .matrix-head .matrix-cell {
      border-bottom: none;
      padding-bottom: 8px;
      align-items: flex-end;
    }
    .size-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .size-head strong {
      font-size: 12px;
      font-weight: 700;
      color: var(--doc-text-main);
    }
    .size-head span {
      font-size: 11px;
      color: var(--doc-text-light);
    }
    .state-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--doc-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot-normal { background-color: #10B981; }
    .dot-hover { background-color: #3B82F6; }
    .dot-active { background-color: #8B5CF6; }
    .dot-disabled { background-color: #9CA3AF; }

    /* ---------------------------------------------------
       Force States for Documentation ONLY
       --------------------------------------------------- */
    /* Primary */
    .lds-btn--primary.is-hover { background-color: var(--color-primary-hover); border-color: var(--color-primary-hover); }
    .lds-btn--primary.is-active { background-color: var(--color-primary-active); border-color: var(--color-primary-active); }
    /* Default */
    .lds-btn--default.is-hover { color: var(--color-text-primary); background-color: var(--color-fill-hover); border-color: var(--color-border-normal); }
    .lds-btn--default.is-active { color: var(--color-primary-normal); background-color: var(--color-fill-primary); border-color: var(--color-primary-normal); }
    /* Secondary */
    .lds-btn--secondary.is-hover { background-color: var(--color-primary-light-normal); border-color: var(--color-primary-normal); }
    .lds-btn--secondary.is-active { background-color: var(--color-fill-primary); border-color: var(--color-primary-normal); }
    /* Text */
    .lds-btn--text.is-hover { background-color: var(--color-fill-hover); }
    .lds-btn--text.is-active { background-color: var(--color-fill-active); }

    /* Capsule forced wrapper states */
    .lds-capsule-wrapper.is-hover .lds-capsule { background-color: var(--color-fill-hover); box-shadow: inset 0 0 0 1px var(--color-border-normal); }
    
    /* Input forced wrapper states */
    .lds-input-wrapper.is-hover { box-shadow: inset 0 0 0 1px var(--color-primary-hover); }
    .lds-search.is-hover { border-color: var(--color-primary-normal); }

    /* Tab forced hover states for preview */
    .lds-tabs--primary .lds-tab.is-hover::before { background-color: var(--color-fill-hover); }
    .lds-tabs--filter .lds-tab.is-hover { background-color: var(--color-fill-hover); }
  </style>
</head>

<!-- JS Logic for Dynamic Matrix Rendering -->
<script>
  // 1. Data Definitions
  const COMMON_SIZES = [
    { id: 'small', label: 'MD', meta: '14px · 6/16px · h36' },
    { id: 'default-size', label: 'LG', meta: '14px · 8/16px · h40' },
    { id: 'large', label: 'XL', meta: '16px · 12/20px · h48' }
  ];

  const SEARCH_SIZES = [
    { id: 'small', label: '小号 (Small)', meta: 'Body Regular · 7/12px · h36' },
    { id: 'default-size', label: '默认 (Default)', meta: 'Body Regular · 9/12px · h40' },
    { id: 'large', label: '大号 (Large)', meta: 'Subtitle Regular · 12/12px · h48' }
  ];

  const SELECT_SIZES = [
    { id: 'large', label: '大号 (Large)', meta: 'Subtitle Regular · 12/12px · h48' },
    { id: 'default-size', label: '默认 (Default)', meta: 'Body Regular · 9/12px · h40' },
    { id: 'small', label: '小号 (Small)', meta: 'Body Regular · 7/12px · h36' }
  ];

  const TAB_SIZES = [
    { id: 'small', label: '小号 (Small)', meta: 'Body Medium · 14px' },
    { id: 'large', label: '默认 (Default)', meta: 'Title Regular · 20px' }
  ];

  const TAG_SIZES = [
    { id: 'small', label: 'S', meta: 'Caption · h20' },
    { id: 'default-size', label: 'M', meta: 'Body · h28' },
    { id: 'large', label: 'L', meta: 'Subtitle · h36' }
  ];

  const PAGINATION_SIZES = [
    { id: 'default-size', label: '默认 (Default)', meta: 'Body Regular · h36' },
    { id: 'small', label: '小号 (Small)', meta: 'Caption Regular · h28' },
  ];

  const FILTER_SIZES = [
    { id: 'default-size', label: '默认 (Default)', meta: 'Body Regular · 9/12px · h40' },
    { id: 'small', label: '小号 (Small)', meta: 'Body Regular · 7/12px · h36' },
  ];

  const TEXTAREA_SIZES = [
    { id: 'default-size', label: '默认 (Default)', meta: 'Body Regular · 8/12/4px · h120' },
    { id: 'large', label: '大号 (Large)', meta: 'Subtitle Regular · 8/12/4px · h120' },
  ];

  const STATES = [
    { id: 'normal', label: 'Default', dot: 'dot-normal', props: '' },
    { id: 'hover', label: 'Hover', dot: 'dot-hover', props: 'class="is-hover"' },
    { id: 'active', label: 'Focus / Active', dot: 'dot-active', props: 'class="is-active"' },
    { id: 'disabled', label: 'Disabled', dot: 'dot-disabled', props: 'disabled' }
  ];

  // We'll collect React components to render after DOM updates
  window.pendingReactRenders = [];

  const COMPONENTS = {
    button: {
      title: 'Button (React Component)',
      sizes: COMMON_SIZES,
      desc: 'Triggers an action or event. Now rendered using the real @life-ds/components-web React component.',
      variants: [
        { title: 'Primary', desc: 'Solid fill — highest emphasis', render: (size, state) => {
            const id = `btn-primary-${size.id}-${state.id}`;
            const className = `${state.id==='hover'?'is-hover':''} ${state.id==='active'?'is-active':''}`;
            window.pendingReactRenders.push({ id, variant: 'primary', size: size.id, className, disabled: state.props.includes('disabled'), text: 'Button' });
            return `<div id="${id}" style="width: 100%;"></div>`;
        }},
        { title: 'Default', desc: 'Outlined — medium emphasis', render: (size, state) => {
            const id = `btn-default-${size.id}-${state.id}`;
            const className = `${state.id==='hover'?'is-hover':''} ${state.id==='active'?'is-active':''}`;
            window.pendingReactRenders.push({ id, variant: 'default', size: size.id, className, disabled: state.props.includes('disabled'), text: 'Button' });
            return `<div id="${id}" style="width: 100%;"></div>`;
        }},
        { title: 'Secondary', desc: 'Subtle fill — low emphasis', render: (size, state) => {
            const id = `btn-secondary-${size.id}-${state.id}`;
            const className = `${state.id==='hover'?'is-hover':''} ${state.id==='active'?'is-active':''}`;
            window.pendingReactRenders.push({ id, variant: 'secondary', size: size.id, className, disabled: state.props.includes('disabled'), text: 'Button' });
            return `<div id="${id}" style="width: 100%; flex: 1 1 auto; min-width: 0;"></div>`;
        }},
        { title: 'Text', desc: 'No fill — lowest emphasis', render: (size, state) => {
            const id = `btn-text-${size.id}-${state.id}`;
            const className = `${state.id==='hover'?'is-hover':''} ${state.id==='active'?'is-active':''}`;
            window.pendingReactRenders.push({ id, variant: 'text', size: size.id, className, disabled: state.props.includes('disabled'), text: 'Button' });

  // 2. Renderer Function

  function renderPages() {
    mainEl.className = 'doc-main doc-main--wide';
    window.pendingReactRenders = [{ id: 'page-gallery-root', type: 'page-gallery' }];
    mainEl.innerHTML = `
      <div class="component-header">
        <div class="breadcrumb">DESIGN SYSTEM &rsaquo; PAGES &rsaquo; <strong>典型页面</strong></div>
        <h1 class="component-title">典型页面</h1>
        <p class="component-desc">基于 layout.md 的页面类型规范，展示来客后台中最常见的列表页与表单页组合。</p>
      </div>
      <div id="page-gallery-root"></div>
    `;
    window.dispatchEvent(new CustomEvent('renderReactButtons'));
  }

  function renderView(compId) {
    if (compId === 'home') {
      renderHome();
      return;
    }
    if (compId === 'pages') {
      renderPages();
      return;
    }

    const comp = COMPONENTS[compId];
    if (!comp) return;
    mainEl.className = 'doc-main';

    let html = `
      <div class="component-header">
        <div class="breadcrumb">DESIGN SYSTEM &rsaquo; COMPONENTS &rsaquo; <strong>${comp.title}</strong></div>
        <h1 class="component-title">${comp.title}</h1>
        <p class="component-desc">${comp.desc}</p>
        <div class="component-stats">
          <div class="stat"><div class="stat-num">${comp.variants.length}</div><div class="stat-label">Variants</div></div>
          ${compId === 'tabs' ? '' : `<div class="stat"><div class="stat-num">${STATES.length}</div><div class="stat-label">States</div></div>`}
          <div class="stat"><div class="stat-num">${comp.sizes.length}</div><div class="stat-label">Sizes</div></div>
        </div>
      </div>
    `;

    comp.variants.forEach((variant, vIdx) => {
      const isTabs = compId === 'tabs';
      const isFull = comp.layout === 'full';
      const renderStates = isTabs || isFull ? [STATES[0]] : STATES;

      html += `
        <div class="variant-section">
          <div class="variant-header">
            <h2 class="variant-title">${variant.title}</h2>
            <span class="variant-desc">${variant.desc}</span>
            <span class="variant-count">VARIANT ${vIdx + 1} / ${comp.variants.length}</span>
          </div>
      `;

      if (isFull) {
        html += `
          <div class="full-preview" style="display: flex; flex-direction: column; gap: 24px;">
            ${comp.sizes.map(size => `
              <div class="size-example">
                <div class="size-head" style="margin-bottom: 12px;"><strong>${size.label}</strong> <span>${size.meta}</span></div>
                <div class="example-content">${variant.render(size, renderStates[0])}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        html += `
          <div class="matrix" style="grid-template-columns: 140px repeat(${comp.sizes.length}, minmax(200px, 1fr));">
            <div class="matrix-row matrix-head">
              <div class="matrix-cell"></div>
              ${comp.sizes.map(s => `<div class="matrix-cell size-head"><strong>${s.label}</strong><span>${s.meta}</span></div>`).join('')}
            </div>
        `;

        renderStates.forEach(state => {
          html += `
              <div class="matrix-row">
                <div class="matrix-cell state-label">
                  ${isTabs ? '' : `<span class="dot ${state.dot}"></span> ${state.label}`}
                </div>
                ${comp.sizes.map(size => `<div class="matrix-cell" style="width: 100%; max-width: 600px;">${variant.render(size, state)}</div>`).join('')}
              </div>
          `;
        });

        html += `</div>`;
      }

      html += `</div>`;
    });

    mainEl.innerHTML = html;

    // Trigger custom event so React script knows to mount
    if (componentTargets.includes(compId)) {
      window.dispatchEvent(new CustomEvent('renderReactButtons'));
    }
  }

  // 3. Initialization and Event Listeners
  const layoutEl = document.querySelector('.doc-layout');
  const navItems = document.querySelectorAll('.nav-item');
  const componentTargets = ['button', 'alert', 'message', 'radio', 'checkbox', 'switch', 'input', 'search', 'select', 'datepicker', 'timepicker', 'textarea', 'filter', 'filtergroup', 'popover', 'tabs', 'navbar', 'menu', 'pageheader', 'steps', 'drawer', 'dialog', 'form', 'upload', 'table', 'tag', 'pagination'];

  function updateLayoutForTarget(target) {
    const showSidebar = componentTargets.includes(target);
    layoutEl.classList.toggle('doc-layout--sidebar-hidden', !showSidebar);
    layoutEl.classList.toggle('doc-layout--home', target === 'home');
  }

  function activateTarget(target, options = {}) {
    const { updateHistory = true, resetScroll = true } = options;
    updateLayoutForTarget(target);
    navItems.forEach(n => n.classList.toggle('active', n.getAttribute('data-target') === target));
    renderView(target);
    if (updateHistory) {
      window.history.pushState({ target }, '', `#${target}`);
    }
    if (resetScroll) {
      window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
    }
  }
  
  function handleNavClick(e) {
    e.preventDefault();
    const target = this.getAttribute('data-target');
    activateTarget(target);
  }

  navItems.forEach(item => item.addEventListener('click', handleNavClick));

  mainEl.addEventListener('click', (e) => {
    const targetEl = e.target instanceof Element ? e.target : e.target.parentElement;
    const globalTarget = targetEl?.closest('[data-global-target]');
    if (globalTarget) {
      e.preventDefault();
      activateTarget(globalTarget.getAttribute('data-global-target'));
      return;
    }
    const navTarget = targetEl?.closest('[data-target]');
    if (navTarget) {
      e.preventDefault();
      activateTarget(navTarget.getAttribute('data-target'));
      return;
    }
    const entry = targetEl?.closest('[data-home-target]');
    if (!entry) return;
    e.preventDefault();
    activateTarget(entry.getAttribute('data-home-target'));
  });

  // Theme toggle
  const themeToggle = document.getElementById('theme-toggle');
  const globalHomeLink = document.querySelector('.doc-global-home');
  function syncThemeToggleLabel(theme) {
    themeToggle.textContent = theme === 'dark' ? '切换浅色' : '切换深色';
  }
  syncThemeToggleLabel(document.documentElement.getAttribute('data-theme') || 'light');
  globalHomeLink?.addEventListener('click', (e) => {
    e.preventDefault();
    activateTarget(globalHomeLink.getAttribute('data-global-target'));
  });
  themeToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    syncThemeToggleLabel(newTheme);
  });

  // Handle URL hash on load
  const hash = window.location.hash.replace('#', '') || 'home';
  activateTarget(['home', 'pages', ...componentTargets].includes(hash) ? hash : 'home', { updateHistory: false });

  window.addEventListener('popstate', () => {
    const currentTarget = window.location.hash.replace('#', '') || 'home';
    activateTarget(['home', 'pages', ...componentTargets].includes(currentTarget) ? currentTarget : 'home', {
      updateHistory: false,
    });
  });

  // Also trigger initial render in case it was already button
  setTimeout(() => {
    if (['home', 'pages', ...componentTargets].includes(hash) || !hash) {
      window.dispatchEvent(new CustomEvent('renderReactButtons'));
    }
  }, 200);
</script>

<script type="text/babel" data-type="module">
  import React from 'react';
  import { createRoot } from 'react-dom/client';
  import { 
    Button, Alert, Message, message, Icon, Radio, Input, Search, Select, DatePicker, TimePicker, Textarea, Tabs, Tab,
    Filter,
    FilterSelect,
    FilterDatePicker,
    FilterTimePicker,
    FilterGroup,
    Popover,
    Navbar,
    Menu,
    PageHeader, Steps, Checkbox, Switch, Drawer, Dialog, Form, FormItem, Upload,
    TableWrapper, Table, Thead, Tbody, Tr, Th, Td, TableCellProduct, TableCellAmount, TableCellOperation, TableCellAction,
    Tag,
    Pagination
  } from '@life-ds/components-web';

  const roots = new Map();

  window.addEventListener('renderReactButtons', () => {
    // We must defer the react rendering slightly to ensure Babel has loaded the module
    // and the DOM is fully ready.
    setTimeout(() => {
      // Clean up old roots if re-rendering
      roots.forEach(root => root.unmount());
      roots.clear();

      const pending = window.pendingReactRenders || [];
      
      pending.forEach(item => {
        const container = document.getElementById(item.id);
        if (!container) return;

        const root = createRoot(container);
        roots.set(item.id, root);

        if (item.type === 'button' || !item.type) {
        const iconElement = item.iconName ? <Icon name={item.iconName} /> : null;
        root.render(
          <Button variant={item.variant} size={item.size} className={item.className} disabled={item.disabled} icon={iconElement}>
            {item.text}
          </Button>
        );
      } else if (item.type === 'alert-demo') {
        const semanticAlertConfigs = [
          {
            key: 'info',
            variant: 'info',
            label: '蓝色',
          },
          {
            key: 'success',
            variant: 'success',
            label: '绿色',
          },
          {
            key: 'warning',
            variant: 'warning',
            label: '橙色',
          },
          {
            key: 'error',
            variant: 'error',
            label: '红色',
          },
          {
            key: 'gray',
            variant: 'gray',
            label: '灰色',
          }
        ];

        const AlertDemo = () => {
          const [seed, setSeed] = React.useState(0);
          const alertText = (
            <>
              消息提示文字自动布局{' '}
              <a href="javascript:void(0)">查看详情</a>
            </>
          );

          const AlertStack = ({ closable = false, includeLabels = false }) => (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {semanticAlertConfigs.map((config) => (
                <div key={config.key} style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {includeLabels ? (
                    <span style={{ font: 'var(--caption-medium)', color: 'var(--color-text-caption)' }}>
                      {config.label}
                    </span>
                  ) : null}
                  <div style={{ width: 400 }}>
                    <Alert
                      key={`${seed}-${config.key}`}
                      variant={config.variant}
                      description={alertText}
                      closable={closable}
                    />
                  </div>
                </div>
              ))}
            </div>
          );

          if (item.mode === 'closable') {
            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
                  <span style={{ font: 'var(--body-regular)', color: 'var(--color-text-secondary)' }}>
                    点击右侧关闭按钮后，提示条会直接从当前页面中移除；重置后可再次查看五种颜色状态。

                    重置示例
                  </Button>
                </div>

                <AlertStack closable includeLabels />
              </div>
            );
          }

          return (
            <AlertStack includeLabels />
          );
        };

        root.render(<AlertDemo />);
      } else if (item.type === 'message-demo') {
        const semanticMessageConfigs = [
          { key: 'info', label: '信息', variant: 'info', text: '已更新筛选条件' },
          { key: 'success', label: '成功', variant: 'success', text: '保存成功' },
          { key: 'warning', label: '警告', variant: 'warning', text: '请先完成必填项' },
          { key: 'error', label: '错误', variant: 'error', text: '操作失败，请稍后重试' }
        ];

        const MessageDemo = () => {
          const triggerMessage = (callback) => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.setTimeout(() => {
              callback();
            }, 220);
          };

          React.useEffect(() => {
            return () => {
              message.destroy();
            };
          }, []);

          if (item.mode === 'duration') {
            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <span style={{ font: 'var(--body-regular)', color: 'var(--color-text-secondary)' }}>

              </Tbody>
            </Table>
          </TableWrapper>
        );
      } else if (item.type === 'tag-matrix') {
        const colors = [
          { id: 'blue', label: 'Blue' },
          { id: 'green', label: 'Green' },
          { id: 'orange', label: 'Orange' },
          { id: 'red', label: 'Red' },
          { id: 'gray', label: 'Gray' },
        ];
        root.render(
          <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 12 }}>
            {colors.map(c => (
              <Tag
                key={c.id}
                size={item.size}
                variant={item.variant}
                color={c.id}
                leftIcon={<Icon name="ic-sell-line" />}
                rightIcon={<Icon name="ic-error-line" />}
              >
                {c.label}
              </Tag>
            ))}
          </div>
        );
      } else if (item.type === 'tag-icon-config') {
        const combos = [
          { l: true, r: true, label: 'L+R' },
          { l: true, r: false, label: 'L Only' },
          { l: false, r: true, label: 'R Only' },
          { l: false, r: false, label: 'None' },
        ];
        root.render(
          <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 12 }}>
            {combos.map(c => (
              <Tag
                key={c.label}
                size={item.size}
                variant={item.variant}
                color="blue"
                leftIcon={c.l ? <Icon name="ic-sell-line" /> : null}
                rightIcon={c.r ? <Icon name="ic-error-line" /> : null}
              >
                {c.label}
              </Tag>
            ))}
          </div>
        );
      } else if (item.type === 'pagination') {
        root.render(
          <Pagination
            size={item.size}
            total={item.total}
            defaultCurrent={item.defaultCurrent}
            defaultPageSize={item.defaultPageSize}
            pageSizeOptions={[10, 20, 50]}
            showSizeChanger={item.showSizeChanger}
            showQuickJumper={item.showQuickJumper}
            showTotal={item.showTotal ? (total, range) => `共 ${total} 条（${range[0]}-${range[1]}）` : undefined}
          />
        );
      }
      });

      // Clear queue
      window.pendingReactRenders = [];
    }, 50);
  });
</script>

</body>
</html>
