<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Design System - Components</title>
  <link rel="icon" href="./assets/logo-laike.svg" type="image/svg+xml">
  
  <link rel="stylesheet" href="./packages/tokens/life-ds-tokens.css?v=token-bg-2">
  <link rel="stylesheet" href="./packages/components-web/styles/base.css?v=token-bg-2">
  <link rel="stylesheet" href="./packages/components-web/styles/components.css?v=token-bg-2">

  <!-- React Dependencies via ESM/CDN -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "clsx": "https://esm.sh/clsx@2.1.1",
        "@life-ds/icons": "./packages/icons/index.js?v=token-bg-2",

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* ---------------------------------------------------
       Doc Site Styles (Matching Reference UI)
       --------------------------------------------------- */
    :root {
      --doc-bg: var(--color-bg-normal);
      --doc-sidebar-bg: var(--color-bg-gray);
      --doc-border: var(--color-border-normal);
      --doc-text-main: var(--color-text-primary);
      --doc-text-muted: var(--color-text-secondary);
      --doc-text-light: var(--color-text-caption);
      --doc-brand: var(--color-primary-normal);
    }
    
    /* We can remove the hardcoded [data-theme="dark"] block here 
       because the tokens handle dark mode automatically in tokens.css */
    
    body {
      margin: 0;
      background-color: var(--doc-bg);
      color: var(--doc-text-main);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .doc-layout {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Sidebar Navigation */
    .doc-sidebar {
      width: 200px;
      background-color: var(--doc-sidebar-bg);
      border-right: 1px solid var(--doc-border);
      padding: 32px 0;
      flex-shrink: 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .doc-layout--sidebar-hidden .doc-sidebar {
      display: none;
    }
    .doc-logo {
      padding: 0 20px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 40px;
      color: var(--doc-text-main);
    }
    .theme-toggle {
      cursor: pointer;
      font: var(--body-medium);
      background: var(--color-bg-dialog);
      border: 1px solid var(--color-border-normal);
      color: var(--doc-text-main);
      padding: 0 var(--spacing-4x);
      height: var(--spacing-10x);
      border-radius: var(--radius-m);
      box-shadow: var(--shadow-small);
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .theme-toggle:hover {
      background: var(--color-fill-hover);
      border-color: var(--color-primary-normal);
    }
    .theme-toggle:active {
      transform: translateY(1px);
    }
    .theme-toggle--global {
      position: static;
    }
    .doc-global-actions {
      position: fixed;
      top: var(--spacing-6x);
      right: var(--spacing-6x);
      z-index: 300;
      display: flex;
      align-items: center;
      gap: var(--spacing-3x);
    }
    .doc-layout--home + .doc-global-actions .doc-global-home {
      display: none;
    }
    .nav-group {
      font-size: 11px;
      font-weight: 700;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 20px;
      margin-bottom: 12px;
    }
    .nav-item {
      display: block;
      padding: 10px 20px;
      color: var(--doc-text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      color: var(--doc-text-main);
      background-color: rgba(0,0,0,0.03);
    }
    [data-theme="dark"] .nav-item:hover { background-color: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--color-primary-normal);
      background-color: rgba(57, 100, 255, 0.05);
      border-left-color: var(--color-primary-normal);
      font-weight: 600;
    }

    /* Main Content Area */
    .doc-main {
      flex: 1;
      margin-left: 200px;
      padding: 64px 80px;
      max-width: 1200px;
      box-sizing: border-box;
    }
    .doc-layout--sidebar-hidden .doc-main {
      margin-left: 0;
      width: 100%;
    }
    .doc-main--home {
      max-width: 1120px;
    }
    .doc-main--wide {
      max-width: none;
      padding: 48px 48px 64px;
    }
    .breadcrumb {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .breadcrumb strong {
      color: var(--doc-text-main);
    }
    
    .component-header {
      margin-bottom: 80px;
    }
    .header-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: var(--spacing-10x);
      padding: 0 var(--spacing-4x);
      border-radius: var(--radius-m);
      background: var(--color-bg-dialog);
      border: 1px solid var(--color-border-normal);
      color: var(--doc-text-main);
      text-decoration: none;
      font: var(--body-medium);
      box-shadow: var(--shadow-small);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    .header-link:hover {
      background: var(--color-fill-hover);
      border-color: var(--color-primary-normal);
    }
    .component-title {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 16px 0;
      color: var(--doc-text-main);
    }
    .component-desc {
      font-size: 16px;
      color: var(--doc-text-muted);
      line-height: 1.6;
      max-width: 500px;
      margin: 0;
    }
    .home-hero {
      display: grid;
      gap: var(--spacing-5x);
      margin-bottom: var(--spacing-10x);
    }
    .home-eyebrow {
      font: var(--caption-medium);
      color: var(--color-text-caption);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .home-title {
      margin: 0;
      font: var(--display-medium);
      color: var(--color-text-primary);
      letter-spacing: -0.5px;
    }
    .home-desc {
      max-width: 640px;
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
      line-height: 1.7;
    }
    .home-entry-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--spacing-6x);
    }
    .home-entry-card {
      display: grid;
      gap: var(--spacing-5x);
      min-height: 220px;
      padding: var(--spacing-8x);
      color: var(--color-text-primary);
      text-decoration: none;
      background: var(--color-fill-normal);
      border: 1px solid var(--color-border-normal);
      border-radius: var(--radius-xxl);
      box-sizing: border-box;
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
    }
    .home-entry-card:hover {
      transform: translateY(-2px);
      background: var(--color-bg-dialog);
      border-color: var(--color-primary-normal);
    }
    .home-entry-card__meta {
      font: var(--caption-medium);
      color: var(--color-primary-normal);
    }
    .home-entry-card__title {
      margin: 0;
      font: var(--headline-medium);
      color: var(--color-text-primary);
    }
    .home-entry-card__desc {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
      line-height: 1.7;
    }
    .home-entry-card__link {
      align-self: end;
      font: var(--body-medium);
      color: var(--color-primary-normal);
    }
    .page-preview-shell {
      width: 100%;
      min-width: 960px;
      border: 1px solid var(--color-border-normal);
      border-radius: var(--radius-xxl);
      overflow: hidden;
      box-sizing: border-box;
    }
    .page-preview-shell .app-container {
      width: 100%;
      height: 760px;
    }
    .page-preview-shell .lds-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-3x);
    }
    .page-preview-form-content {
      width: 872px;
      min-width: 648px;
      max-width: 872px;
      margin: 0 auto;
      padding-top: var(--spacing-2x);
      padding-bottom: var(--spacing-8x);
      box-sizing: border-box;
    }
    .page-preview-hero {
      display: flex;
      gap: var(--spacing-5x);
      box-sizing: border-box;
    }
    .page-preview-hero-divider {
      margin: var(--spacing-8x) 0;
      border-top: 1px dashed var(--color-border-normal);
    }
    .page-preview-steps {
      display: flex;
      justify-content: center;
      margin-bottom: var(--spacing-8x);
    }
    .page-preview-steps .lds-steps {
      width: auto;
      max-width: 100%;
    }
    .page-preview-hero__media {
      width: 84px;
      height: 84px;
      flex: 0 0 auto;
      border-radius: var(--radius-m);
      background: var(--color-fill-gray);
      overflow: hidden;
    }
    .page-preview-hero__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .page-preview-section {
      display: grid;
      gap: var(--spacing-5x);
    }
    .page-preview-section + .page-preview-section {
      margin-top: var(--spacing-8x);
    }
    .page-preview-section__title {
      margin: 0;
      font: var(--title-medium);
      color: var(--color-text-primary);
    }
    .page-preview-actions {
      display: grid;
      padding: var(--spacing-5x) var(--spacing-8x);
      border-top: 1px solid var(--color-divider-normal);
    }
    .page-preview-actions__inner {
      width: 872px;
      min-width: 648px;
      max-width: 872px;
      margin: 0 auto;
      display: grid;
      justify-content: center;
      gap: var(--spacing-4x);
    }
    .page-preview-actions__buttons {
      display: flex;
      justify-content: center;
      gap: var(--spacing-3x);
    }
    .page-preview-stack {
      display: grid;
      gap: var(--spacing-6x);
    }
    .page-preview-example-meta {
      display: grid;
      gap: var(--spacing-base);
    }
    .page-preview-example-meta__title {
      margin: 0;
      font: var(--title-medium);
      color: var(--color-text-primary);
    }
    .page-preview-example-meta__desc {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
    }
    .page-preview-form-layout--with-preview {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--spacing-10x);
      padding-left: calc(var(--spacing-10x) + var(--spacing-2x));
      box-sizing: border-box;
    }
    .page-preview-form-content--compact {
      width: 648px;
      min-width: 648px;
      max-width: 648px;
      margin: 0;
    }
    .page-preview-side-preview {
      width: 360px;
      flex: 0 0 360px;
      display: grid;
      gap: var(--spacing-4x);
      padding-top: var(--spacing-2x);
      box-sizing: border-box;
    }
    .page-preview-side-preview__header {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: var(--spacing-3x);
    }
    .page-preview-side-preview__title {
      margin: 0;
      flex: 0 0 auto;
      font: var(--title-medium);
      color: var(--color-text-primary);
    }
    .page-preview-side-preview__desc {
      margin: 0;
      flex: 0 1 auto;
      font: var(--body-regular);
      color: var(--color-text-secondary);
    }
    .page-preview-side-preview__card {
      display: grid;
      justify-items: start;
      gap: var(--spacing-4x);
      box-sizing: border-box;
    }
    .page-preview-side-preview__tabs {
      width: fit-content;
      max-width: 100%;
    }
    .page-preview-side-preview__device {
      width: 100%;
      max-width: 304px;
      margin: 0;
      border: 6px solid #0c0d0f;
      border-radius: 42px;
      background: #0c0d0f;
      overflow: hidden;
      box-shadow: 0 16px 32px rgba(12, 13, 15, 0.14);
      box-sizing: border-box;
    }
    .page-preview-side-preview__device::before {
      content: none;
    }
    .page-preview-side-preview__device::after {
      content: none;
    }
    .page-preview-side-preview__scene {
      aspect-ratio: 292 / 632;
      border-radius: 36px;
      overflow: hidden;
      background: var(--color-fill-gray);
    }
    .page-preview-side-preview__scene--cover {
      display: block;
    }
    .page-preview-side-preview__scene--poster {
      display: block;
    }
    .page-preview-side-preview__scene--detail {
      display: block;
    }
    .page-preview-side-preview__image-frame {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      background: var(--color-fill-gray);
    }
    .page-preview-side-preview__image-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .page-preview-actions__inner--with-preview {
      width: 648px;
      min-width: 648px;
      max-width: 648px;
      margin: 0 auto;
    }
    .page-preview-detail-status-block {
      display: grid;
      gap: var(--spacing-8x);
    }
    .page-preview-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--spacing-5x) var(--spacing-8x);
    }
    .page-preview-detail-grid--single {
      grid-template-columns: minmax(0, 1fr);
    }
    .page-preview-detail-item {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      align-items: start;
      column-gap: var(--spacing-5x);
      row-gap: var(--spacing-base);
      min-width: 0;
    }
    .page-preview-detail-item--vertical {
      grid-template-columns: minmax(0, 1fr);
    }
    .page-preview-detail-item--span-2 {
      grid-column: span 2;
    }
    .page-preview-detail-item__label {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-caption);
    }
    .page-preview-detail-item__value {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-primary);
      word-break: break-word;
      min-width: 0;
    }
    .page-preview-detail-item__value--number {
      font-family: var(--font-number);
    }
    .page-preview-detail-card-copy {
      display: grid;
      gap: var(--spacing-4x);
    }
    .page-preview-detail-card-copy-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--spacing-3x);
    }
    .page-preview-detail-card-copy-title {
      margin: 0;
      font: var(--title-medium);
      color: var(--color-text-primary);
    }
    .page-preview-detail-card-copy-desc {
      margin: 0;
      font: var(--body-regular);
      color: var(--color-text-secondary);
    }
    .page-preview-detail-card-copy-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-2x);
    }
    .page-preview-detail-card-copy-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: var(--spacing-2x);
      font: var(--body-regular);
      color: var(--color-text-primary);
    }
    .page-preview-detail-image-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-4x);
    }
    .page-preview-detail-image {
      display: grid;
      gap: var(--spacing-2x);
      width: 76px;
      min-width: 0;
    }
    .page-preview-detail-image__frame {
      width: 76px;
      height: 76px;
      border-radius: var(--radius-m);
      overflow: hidden;
      background: var(--color-fill-gray);
    }
    .page-preview-detail-image__frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .page-preview-detail-image__caption {
      margin: 0;
      font: var(--caption-regular);
      color: var(--color-text-secondary);
      text-align: center;
    }
    @media (max-width: 960px) {
      .home-entry-grid {
        grid-template-columns: 1fr;
      }
      .doc-main--wide {
        padding: 32px;
      }
    }
    .component-stats {
      position: absolute;
      right: 0;
      bottom: 0;
      display: flex;
      gap: 40px;
    }
    .stat {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--doc-brand);
      line-height: 1;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Variant Section */
    .variant-section {
      margin-bottom: 80px;
    }
    .variant-header {
      display: flex;
      align-items: baseline;
      border-bottom: 1px solid var(--doc-border);
      padding-bottom: 16px;
      margin-bottom: 40px;
    }
    .variant-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 16px 0 0;
      letter-spacing: -0.5px;
    }
    .variant-desc {
      font-size: 14px;
      color: var(--doc-text-muted);
      flex: 1;
    }
    .variant-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--doc-text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Matrix Layout Grid */
    .matrix {
      display: grid;
      grid-template-columns: 140px repeat(3, minmax(140px, 1fr));
      gap: 32px 16px;
      align-items: center;
    }
    .matrix-row {
      display: contents;
    }
    .matrix-cell {
      padding: 16px 0;
      border-bottom: 1px solid var(--doc-border);
      display: flex;
      align-items: center;
      height: 100%;
    }
    .matrix-head .matrix-cell {
      border-bottom: none;
      padding-bottom: 8px;
      align-items: flex-end;
    }
    .size-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .size-head strong {
      font-size: 12px;
      font-weight: 700;
      color: var(--doc-text-main);
    }
    .size-head span {
      font-size: 11px;
      color: var(--doc-text-light);
    }
    .state-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--doc-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot-normal { background-color: #10B981; }
    .dot-hover { background-color: #3B82F6; }
    .dot-active { background-color: #8B5CF6; }
    .dot-disabled { background-color: #9CA3AF; }

    /* ---------------------------------------------------
       Force States for Documentation ONLY
       --------------------------------------------------- */
    /* Primary */
    .lds-btn--primary.is-hover { background-color: var(--color-primary-hover); border-color: var(--color-primary-hover); }
    .lds-btn--primary.is-active { background-color: var(--color-primary-active); border-color: var(--color-primary-active); }
    /* Default */
    .lds-btn--default.is-hover { color: var(--color-text-primary); background-color: var(--color-fill-hover); border-color: var(--color-border-normal); }
    .lds-btn--default.is-active { color: var(--color-primary-normal); background-color: var(--color-fill-primary); border-color: var(--color-primary-normal); }
    /* Secondary */
    .lds-btn--secondary.is-hover { background-color: var(--color-primary-light-normal); border-color: var(--color-primary-normal); }
    .lds-btn--secondary.is-active { background-color: var(--color-fill-primary); border-color: var(--color-primary-normal); }
    /* Text */
    .lds-btn--text.is-hover { background-color: var(--color-fill-hover); }
    .lds-btn--text.is-active { background-color: var(--color-fill-active); }

    /* Capsule forced wrapper states */
    .lds-capsule-wrapper.is-hover .lds-capsule { background-color: var(--color-fill-hover); box-shadow: inset 0 0 0 1px var(--color-border-normal); }
    
    /* Input forced wrapper states */
    .lds-input-wrapper.is-hover { box-shadow: inset 0 0 0 1px var(--color-primary-hover); }
    .lds-search.is-hover { border-color: var(--color-primary-normal); }

    /* Tab forced hover states for preview */
    .lds-tabs--primary .lds-tab.is-hover::before { background-color: var(--color-fill-hover); }
    .lds-tabs--filter .lds-tab.is-hover { background-color: var(--color-fill-hover); }
  </style>
</head>
<body>

<div class="doc-layout">
  <!-- Sidebar Navigation -->
  <aside class="doc-sidebar">
    <div class="doc-logo">
      LIFE DESIGN
    </div>
    <div class="nav-group">COMPONENTS</div>
    <a href="#button" class="nav-item active" data-target="button">Button</a>
    <a href="#icon" class="nav-item" data-target="icon">Icon</a>
    <a href="#alert" class="nav-item" data-target="alert">Alert</a>
    <a href="#card" class="nav-item" data-target="card">Card</a>
    <a href="#message" class="nav-item" data-target="message">Message</a>
    <a href="#radio" class="nav-item" data-target="radio">Radio</a>

    `;

  }

  function renderView(compId) {
    if (compId === 'home') {
      renderHome();
      return;
    }
    if (compId === 'pages') {
      renderPages();
      return;
    }

    const comp = COMPONENTS[compId];
    if (!comp) return;
    mainEl.className = 'doc-main';

    let html = `
      <div class="component-header">
        <div class="breadcrumb">DESIGN SYSTEM &rsaquo; COMPONENTS &rsaquo; <strong>${comp.title}</strong></div>
        <h1 class="component-title">${comp.title}</h1>
        <p class="component-desc">${comp.desc}</p>
        <div class="component-stats">
          <div class="stat"><div class="stat-num">${comp.variants.length}</div><div class="stat-label">Variants</div></div>
          ${compId === 'tabs' ? '' : `<div class="stat"><div class="stat-num">${STATES.length}</div><div class="stat-label">States</div></div>`}
          <div class="stat"><div class="stat-num">${comp.sizes.length}</div><div class="stat-label">Sizes</div></div>
        </div>
      </div>
    `;

    comp.variants.forEach((variant, vIdx) => {
      const isTabs = compId === 'tabs';
      const isFull = comp.layout === 'full';
      const renderStates = isTabs || isFull ? [STATES[0]] : STATES;

      html += `
        <div class="variant-section">
          <div class="variant-header">
            <h2 class="variant-title">${variant.title}</h2>
            <span class="variant-desc">${variant.desc}</span>
            <span class="variant-count">VARIANT ${vIdx + 1} / ${comp.variants.length}</span>
          </div>
      `;

      if (isFull) {
        html += `
          <div class="full-preview" style="display: flex; flex-direction: column; gap: 24px;">
            ${comp.sizes.map(size => `
              <div class="size-example">
                <div class="size-head" style="margin-bottom: 12px;"><strong>${size.label}</strong> <span>${size.meta}</span></div>
                <div class="example-content">${variant.render(size, renderStates[0])}</div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        html += `
          <div class="matrix" style="grid-template-columns: 140px repeat(${comp.sizes.length}, minmax(200px, 1fr));">
            <div class="matrix-row matrix-head">
              <div class="matrix-cell"></div>
              ${comp.sizes.map(s => `<div class="matrix-cell size-head"><strong>${s.label}</strong><span>${s.meta}</span></div>`).join('')}
            </div>
        `;

        renderStates.forEach(state => {
          html += `
              <div class="matrix-row">
                <div class="matrix-cell state-label">
                  ${isTabs ? '' : `<span class="dot ${state.dot}"></span> ${state.label}`}
                </div>
                ${comp.sizes.map(size => `<div class="matrix-cell" style="width: 100%; max-width: 600px;">${variant.render(size, state)}</div>`).join('')}
              </div>
          `;
        });

        html += `</div>`;
      }

      html += `</div>`;
    });

    mainEl.innerHTML = html;

    // Trigger custom event so React script knows to mount
    if (componentTargets.includes(compId)) {
      window.dispatchEvent(new CustomEvent('renderReactButtons'));
    }
  }

  // 3. Initialization and Event Listeners
  const layoutEl = document.querySelector('.doc-layout');
  const navItems = document.querySelectorAll('.nav-item');
  const componentTargets = ['button', 'icon', 'alert', 'card', 'message', 'radio', 'checkbox', 'switch', 'input', 'search', 'select', 'datepicker', 'timepicker', 'textarea', 'filter', 'filtergroup', 'popover', 'tabs', 'navbar', 'menu', 'pageheader', 'status', 'steps', 'drawer', 'dialog', 'form', 'keyvalue', 'upload', 'table', 'tag', 'pagination'];

  function updateLayoutForTarget(target) {
    const showSidebar = componentTargets.includes(target);
    layoutEl.classList.toggle('doc-layout--sidebar-hidden', !showSidebar);
    layoutEl.classList.toggle('doc-layout--home', target === 'home');
  }

  function activateTarget(target, options = {}) {
    const { updateHistory = true, resetScroll = true } = options;
    updateLayoutForTarget(target);
    navItems.forEach(n => n.classList.toggle('active', n.getAttribute('data-target') === target));
    renderView(target);
    if (updateHistory) {
      window.history.pushState({ target }, '', `#${target}`);
    }
    if (resetScroll) {
      window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
    }
  }
  
  function handleNavClick(e) {
    e.preventDefault();
    const target = this.getAttribute('data-target');
    activateTarget(target);
  }

  navItems.forEach(item => item.addEventListener('click', handleNavClick));

  mainEl.addEventListener('click', (e) => {
    const targetEl = e.target instanceof Element ? e.target : e.target.parentElement;
    const globalTarget = targetEl?.closest('[data-global-target]');
    if (globalTarget) {
      e.preventDefault();
      activateTarget(globalTarget.getAttribute('data-global-target'));
      return;
    }
    const navTarget = targetEl?.closest('[data-target]');
    if (navTarget) {
      e.preventDefault();
      activateTarget(navTarget.getAttribute('data-target'));
      return;
    }
    const entry = targetEl?.closest('[data-home-target]');
    if (!entry) return;
    e.preventDefault();
    activateTarget(entry.getAttribute('data-home-target'));
  });

  // Theme toggle
  const themeToggle = document.getElementById('theme-toggle');
  const globalHomeLink = document.querySelector('.doc-global-home');
  function syncThemeToggleLabel(theme) {
    themeToggle.textContent = theme === 'dark' ? '切换浅色' : '切换深色';
  }
  syncThemeToggleLabel(document.documentElement.getAttribute('data-theme') || 'light');
  globalHomeLink?.addEventListener('click', (e) => {
    e.preventDefault();
    activateTarget(globalHomeLink.getAttribute('data-global-target'));
  });
  themeToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    syncThemeToggleLabel(newTheme);
  });

  // Handle URL hash on load
  const hash = window.location.hash.replace('#', '') || 'home';
  activateTarget(['home', 'pages', ...componentTargets].includes(hash) ? hash : 'home', { updateHistory: false });

  window.addEventListener('popstate', () => {
    const currentTarget = window.location.hash.replace('#', '') || 'home';
    activateTarget(['home', 'pages', ...componentTargets].includes(currentTarget) ? currentTarget : 'home', {
      updateHistory: false,
    });
  });

  // Also trigger initial render in case it was already button
  setTimeout(() => {
    if (['home', 'pages', ...componentTargets].includes(hash) || !hash) {
      window.dispatchEvent(new CustomEvent('renderReactButtons'));
    }
  }, 200);
</script>

          return hour * 60 + minute;

          const [start, end] = rangeValue;
          if (start instanceof Date && current < start) return false;
          if (end instanceof Date && current > end) return false;
          return true;

          const [start, end] = rangeValue;
